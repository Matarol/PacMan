<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/style.css">
    <title>PacMan</title>
</head>
<body>
    <main>
        <p style="color: white; font-family: sans-serif; font-size: 14px; margin-bottom: 6px; padding: 10px 20px;">
            <span>Score: </span><span id="scoreEl" class="span-number">0 </span><span> Streak Score: </span><span id="streakScoreEl" class="span-number">0 </span><span> High Score: </span><span id="highScoreEl" class="span-number">0</span>
        </p>

        <div id="gameUi" style="display: none; position: absolute; color: white; font-family: sans-serif; text-align: center; background: rgba(0,0,0,0.8); padding: 20px; border: 2px solid white;">
            <h1 id="statusText">YOU WIN</h1>
            <p>Press Space to Restart</p>
        </div>

        <!-- Menycontainer -->
        <div id="ui-overlay" class="menu">
            <h1 id="menu-title">Title</h1>
            <div id="menu-content">                
            </div>
            <div id="menu-buttons">
            </div>
        </div>

        <canvas id="canvas1"></canvas>

            <button data-key="w">↑</button>

                <button data-key="a">←</button>
                <button data-key="s">↓</button>
                <button data-key="d">→</button>
            </div>
        </div> -->
    </main>
    
    <script type="module" src="./src/game.js"></script>

</html>
